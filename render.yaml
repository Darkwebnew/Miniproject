services:
  - type: web
    name: heartseg-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --timeout 300 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        value: HeartSegAI2026SecureKey
      - key: DEBUG
        value: False
