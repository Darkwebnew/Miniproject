<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#030712">
    <title>Page Not Found | HeartSeg AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="container nav-container">
        <a href="{{ url_for('home') }}" class="logo">
            <i class="fa-solid fa-heart-circle-check"></i>
            <span>HeartSeg AI</span>
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('about') }}">About</a></li>
            <li><a href="{{ url_for('contact') }}">Contact</a></li>
        </ul>
        <a href="{{ url_for('login') }}" class="btn-login-nav">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Launch Demo
        </a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>

<!-- Error Page -->
<main class="error-page">
    <div class="error-card glass" data-reveal>
        <div class="error-icon">
            <i class="fa-solid fa-heart-crack"></i>
        </div>
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <div class="error-actions">
            <a href="{{ url_for('home') }}" class="btn-primary">
                <i class="fa-solid fa-house"></i>
                Back to Home
            </a>
            <a href="{{ url_for('login') }}" class="btn-secondary">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                Launch Demo
            </a>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="page-footer">
    <div class="container">
        <p> HeartSeg AI. Developed by Sriram V at Saveetha Engineering College.</p>
    </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
